# =================================================================
# LOCAL DEVELOPMENT CI WRAPPER FOR go-main
# =================================================================
# PURPOSE:
#   Run Go CI jobs locally without pushing to GitLab.
#   The real .gitlab-ci.yml uses remote GitLab Components which
#   cannot be fetched locally. This file uses local equivalents.
#
# USAGE (from repo root, requires Docker running):
#   List all jobs:           gitlab-ci-local --file .gitlab-ci-local.yml --list
#   Run Go Lint:             gitlab-ci-local --file .gitlab-ci-local.yml "Go Lint"
#   Run Go Unit Test:        gitlab-ci-local --file .gitlab-ci-local.yml "Go Unit Test"
#   Run Go Vet:              gitlab-ci-local --file .gitlab-ci-local.yml "Go Vet"
#   Run Go Vulncheck:        gitlab-ci-local --file .gitlab-ci-local.yml "Go Vulncheck"
#   Run all jobs:            gitlab-ci-local --file .gitlab-ci-local.yml
#
# NOTE ON PRIVATE DEPS:
#   go.mod requires private bitbucket.org/csgot/* packages.
#   Go Unit Test / Vet / Vulncheck will fail at "go mod download"
#   without Bitbucket credentials. Go Lint does NOT need these deps.
# =================================================================

stages:
  - lint
  - test

# ---------------------------------------------------------------
# BASE: Override the private AWS ECR image with a public one
# The real component uses: 533267242017.dkr.ecr.eu-west-1.amazonaws.com/tools:go-trixie-1.25
# Locally we use golang:1.24-alpine + install tools via before_script
# ---------------------------------------------------------------
.go:base:
  stage: test
  image: golang:1.24-alpine
  cache: []
  dependencies: []
  interruptible: true
  variables:
    GIT_STRATEGY: clone
    CI_PROJECT_DIR: "/builds/project"
    docker-app-path: "/builds/project/tests/app"
  before_script:
    - apk add --no-cache git openssh-client curl bash
    - git config --global url."https://bitbucket.org/".insteadOf "ssh://git@bitbucket.org/"
    - git config --global url."https://bitbucket.org/".insteadOf "git@bitbucket.org/"

# ---------------------------------------------------------------
# GO LINT
# Uses golangci-lint Docker image directly (no private deps needed)
# IMPORTANT: We use --no-config and only enable syntax-level linters
# that do NOT require package loading (private bitbucket deps).
# The full linter set runs on GitLab CI where deps are available.
# ---------------------------------------------------------------
Go Lint:
  stage: lint
  image: golangci/golangci-lint:v2.1.6
  variables:
    GIT_STRATEGY: clone
  script:
    - cd tests/app
    - mkdir -p reports
    - |
      set +e
      golangci-lint run \
        --no-config \
        --timeout=10m \
        --disable-all \
        --enable=gofmt \
        --enable=goimports \
        --enable=misspell \
        --enable=lll \
        --enable=whitespace \
        --enable=dogsled \
        --enable=dupl \
        --enable=nakedret \
        --enable=gocyclo \
        --enable=gocognit \
        --enable=funlen \
        --enable=nestif \
        --enable=asciicheck \
        --enable=prealloc \
        --enable=goprintffuncname \
        --enable=wsl \
        --output.text.print-issued-lines=true \
        --output.text.path=stdout
      status=$?
      exit $status
  artifacts:
    paths:
      - tests/app/reports/code-quality-report.json
    when: always
  rules:
    - when: always

# ---------------------------------------------------------------
# GO UNIT TEST
# Requires: private bitbucket.org/csgot/* packages (go mod download)
# Will fail without Bitbucket credentials — this is expected locally.
# Set allow_failure: true so pipeline does not block on this.
# ---------------------------------------------------------------
Go Unit Test:
  extends: .go:base
  stage: test
  script:
    - cd tests/app
    - go mod download
    - go install gotest.tools/gotestsum@latest
    - mkdir -p /tmp/reports
    - gotestsum --junitfile /tmp/reports/gounit.xml --format testname -- -coverprofile=/tmp/reports/cover.out -covermode count ./...
    - go tool cover -func /tmp/reports/cover.out | tail -n 1
  coverage: '/total:\s+\(statements\)\s+\d+.\d+%/'
  artifacts:
    paths:
      - /tmp/reports/
    when: always
  allow_failure: true
  rules:
    - when: always

# ---------------------------------------------------------------
# GO VET
# Requires: private bitbucket.org/csgot/* packages
# May fail locally without Bitbucket credentials.
# ---------------------------------------------------------------
Go Vet:
  extends: .go:base
  stage: test
  script:
    - cd tests/app
    - go mod download
    - go vet ./...
  allow_failure: true
  rules:
    - when: always

# ---------------------------------------------------------------
# GO VULNCHECK
# Requires: private bitbucket.org/csgot/* packages
# May fail locally without Bitbucket credentials.
# ---------------------------------------------------------------
Go Vulncheck:
  extends: .go:base
  stage: test
  script:
    - cd tests/app
    - go mod download
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck -scan package ./...
  allow_failure: true
  rules:
    - when: always
